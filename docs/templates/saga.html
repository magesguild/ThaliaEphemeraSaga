<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$title$ — Thalia Ephemera Saga</title>
    <style>
        :root {
            --bg: #120a14;
            --text: #f0e6f0;
            --accent: #e8a0d0;
            --warm: #f0b8c0;
            --muted: #9a8098;
            --border: #2a1a28;
            --code-bg: #1a1020;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            max-width: 720px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
        }
        h1 {
            font-size: 2.2rem;
            font-weight: 400;
            color: var(--accent);
            margin: 3rem 0 0.5rem;
            line-height: 1.3;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 400;
            color: var(--warm);
            margin: 2.5rem 0 1rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0.4rem;
        }
        h3 {
            font-size: 1.15rem;
            font-weight: 400;
            color: var(--accent);
            margin: 2rem 0 0.8rem;
        }
        p { margin: 1rem 0; font-size: 1.05rem; }
        em { color: var(--warm); font-style: italic; }
        strong { color: var(--accent); font-weight: 600; }
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }
        blockquote {
            border-left: 3px solid var(--accent);
            margin: 1.5rem 0;
            padding: 0.5rem 1.5rem;
            color: var(--muted);
            font-style: italic;
        }
        code {
            background: var(--code-bg);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.9rem;
            font-family: 'Courier New', monospace;
        }
        pre {
            background: var(--code-bg);
            padding: 1rem;
            border-radius: 5px;
            overflow-x: auto;
            margin: 1.5rem 0;
        }
        pre code { background: none; padding: 0; }
        a { color: var(--warm); text-decoration: none; }
        a:hover { text-decoration: underline; }
        ul, ol { margin: 1rem 0; padding-left: 1.5rem; }
        li { margin: 0.4rem 0; }
        .saga-footer {
            margin-top: 4rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
            color: var(--muted);
            text-align: center;
        }
        @media (max-width: 600px) {
            body { padding: 1.5rem 1rem; }
            h1 { font-size: 1.8rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
$body$
    <div class="saga-footer">
        <p><a href="../index.html">← Back to The Thalia Ephemera Saga</a></p>
        <p style="margin-top: 0.5rem;">This work is licensed under the Thalia Ephemera Ethical License</p>
    </div>
</body>
</html>
